name: Build Android APK

on:
  push:
  workflow_dispatch:  # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk autoconf libtool cmake pkg-config \
            libltdl-dev libffi-dev libssl-dev zip unzip

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Remove broken system Android SDK
        run: |
          # GitHub's ubuntu-latest has a broken SDK at /usr/local/lib/android/sdk
          # that lacks sdkmanager. Move it so buildozer downloads a clean one.
          sudo mv /usr/local/lib/android/sdk /usr/local/lib/android/sdk.bak 2>/dev/null || true

      - name: Build APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd $GITHUB_WORKSPACE
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DuplicateImageFinder-APK
          path: bin/*.apk
