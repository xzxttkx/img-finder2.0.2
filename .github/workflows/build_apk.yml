name: Build Android APK

on:
  push:
  workflow_dispatch:  # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk autoconf libtool cmake pkg-config \
            libltdl-dev libffi-dev libssl-dev zip unzip

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd $GITHUB_WORKSPACE
          # Unset GitHub's broken pre-installed SDK so buildozer downloads its own
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          # Pipe 'yes' to auto-accept all SDK license prompts
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DuplicateImageFinder-APK
          path: bin/*.apk
